<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 Umpires Manual</title>
    <link rel="stylesheet" href="./styles.css?v=20260326-4" />
    <style>
      .manual-page {
        width: calc(100% - 32px);
        margin: 0 auto;
        padding: 28px 0 72px;
      }

      .manual-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background: var(--surface);
        padding: 28px;
      }

      .manual-toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 20px;
      }

      .manual-layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 24px;
      }

      @media (max-width: 900px) {
        .manual-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="manual-page">
      <section class="manual-panel">
        <div class="manual-toolbar">
          <div>
            <p class="section-label">Umpires Manual Reader</p>
            <h1 id="manual-title">2026 Umpires Manual</h1>
            <p class="rule-reader-source">Official 2026 Umpires Manual</p>
            <p class="panel-copy">Version 2 manual loader</p>
          </div>
          <a class="ghost-button" href="./index.html">Back to Study Center</a>
        </div>

        <div class="manual-layout">
          <aside class="rule-reader-nav" id="manual-nav">
            <p class="rule-reader-empty">Loading manual...</p>
          </aside>
          <div class="rule-reader-body" id="manual-body">
            <p class="rule-reader-empty">Loading manual...</p>
          </div>
        </div>
      </section>
    </main>

    <script>
      (function () {
        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function cleanManualText(text) {
          let cleaned = String(text || "")
            .replace(/\r/g, "")
            .replace(/\u00a0/g, " ")
            .replace(/\u2019/g, "'")
            .replace(/\u2018/g, "'")
            .replace(/\u201c/g, '"')
            .replace(/\u201d/g, '"')
            .replace(/\uFFFD/g, "")
            .replace(/[<>]/g, "")
            .replace(/Part\[\]/g, "")
            .replace(/Part\]\]/g, "")
            .replace(/^\s*[\u2022•]+\s*/gm, "")
            .replace(/^[\t .•,;:'"“”‘’\-_/\\|]+$/gm, "")
            .replace(/^\s*[•.]\s*/gm, "")
            .replace(/\n{3,}/g, "\n\n");

          const replacements = [
            [/^m:troduction$/gim, "Introduction"],
            [/^DEFINITION OFTERMS$/gim, "DEFINITION OF TERMS"],
            [/^Delinilian al Terms$/gim, "Definition of Terms"],
            [/^WORKING THEPLATE$/gim, "WORKING THE PLATE"],
            [/^WORKING THE BASES$/gim, "WORKING THE BASES"],
            [/^WORKING AS A TEAM$/gim, "WORKING AS A TEAM"],
            [/^PREGAME PREPARATIONS$/gim, "PREGAME PREPARATIONS"],
            [/^SIGNAL CHART$/gim, "SIGNAL CHART"],
            [/^CREW OF ONE$/gim, "CREW OF ONE"],
            [/^CREW OF TWO$/gim, "CREW OF TWO"],
            [/^CREW OF THREE$/gim, "CREW OF THREE"],
            [/^CREW OF FOUR$/gim, "CREW OF FOUR"],
            [/^SECTION 3 WORKING THE PLATE$/gim, "WORKING THE PLATE"],
            [/^SECTION 4 WORKING THE BASES$/gim, "WORKING THE BASES"],
            [/^SECTION 5 WORKING AS A TEAM$/gim, "WORKING AS A TEAM"],
            [/^SECTION 6 PREGAME PREPARATIONS$/gim, "PREGAME PREPARATIONS"],
            [/^SECTION 7 SIGNAL CHART$/gim, "SIGNAL CHART"],
            [/^SECTION 8 CREW OF ONE$/gim, "CREW OF ONE"],
            [/^SECTION 9 CREW OF TWO.*$/gim, "CREW OF TWO"],
            [/^SECTION 10 CREW OF THREE.*$/gim, "CREW OF THREE"],
            [/^SECTION 11 CREW OF FOUR.*$/gim, "CREW OF FOUR"],
            [/^DEFINITION OF TERMS\s+DEFINITION OF TERMS$/gim, "DEFINITION OF TERMS"],
            [/^WORKING THE PLATE\s+WORKING THE PLATE$/gim, "WORKING THE PLATE"],
            [/^WORKING THE BASES\s+WORKING THE BASES$/gim, "WORKING THE BASES"],
            [/\bBaseoall\b/g, "Baseball"],
            [/\binthe\b/g, "in the"],
            [/\bespeciallyat\b/g, "especially at"],
            [/\bhighschool\b/g, "high school"],
            [/\btheneedfor\b/g, "the need for"],
            [/\bthenumber\b/g, "the number"],
            [/\bthemost\b/g, "the most"],
            [/\byoumight\b/g, "you might"],
            [/\bhavea\b/g, "have a"],
            [/\bwitha\b/g, "with a"],
            [/\bbeon\b/g, "be on"],
            [/\btheNFHS\b/g, "the NFHS"],
            [/\bencourageall\b/g, "encourage all"],
            [/\bumpiresto\b/g, "umpires to"],
            [/\bassignersand\b/g, "assigners and"],
            [/\bwithou,t\.any\b/g, "without any"],
            [/\bwithou,t\b/g, "without"],
            [/\bAndwhile\b/g, "And while"],
            [/\bwin orlose\b/g, "win or lose"],
            [/\bthegame\b/g, "the game"],
            [/\bas ateam\b/g, "as a team"],
            [/\bthird teamonthe\b/g, "third team on the"],
            [/\bQJear:therunner\b/g, "Clear the runner"],
            [/\bDead,ball\b/g, "Dead-ball"],
            [/\bBefore theplay\b/g, "Before the play"],
            [/\bClear thecatcher\b/g, "Clear the catcher"],
            [/\bFi11lders\b/g, "Fielders"],
            [/\bfoulterritory\b/g, "foul territory"],
            [/\bimaginary linethat\b/g, "imaginary line that"],
            [/\btheballis nolonger\b/g, "the ball is no longer"],
            [/\bPlayb:a\/1!\b/g, "Play ball!"],
            [/\bPU- The plate umpire\./g, "PU - The plate umpire."],
            [/\bBR- The batter-runner\./g, "BR - The batter-runner."],
            [/\bThe illustrationsinthis\b/g, "The illustrations in this"],
            [/\btoexplain\b/g, "to explain"],
            [/\bmechanicsandprocedurt1s\b/g, "mechanics and procedures"],
            [/\bmechanicsandprocedures\b/g, "mechanics and procedures"],
            [/\bIncertain\b/g, "In certain"],
            [/\bRefereehas\b/g, "Referee has"],
            [/^\s*"\s*Go\s*"\s*OJ\s*"goes"\s*-/gim, '"Go" or "goes" -'],
            [/^f"IJ'st-.base line extended\s*-/gim, "First-base line extended -"],
            [/^\.Cutout\s*-/gim, "Cutout -"],
            [/^Dead-ball signal\s*-\s*To indical!!/gim, "Dead-ball signal - To indicate"],
            [/^Below the\.knee catch-A/gim, "Below-the-knee catch - A"],
            [/^Drift-\s*/gim, "Drift - "],
            [/^Imaginary box-\s*/gim, "Imaginary box - "],
            [/^Opening Ille gate -A/gim, "Opening the gate - A"],
            [/^Pause, readand react -A/gim, "Pause, read and react - A"],
            [/^Play - The action that develops as a runner, the balland a fielder/gim, "Play - The action that develops as a runner, the ball and a fielder"],
            [/^Position A- /gim, "Position A - "],
            [/^Position B- /gim, "Position B - "],
            [/^Position C- /gim, "Position C - "],
            [/^Position D- /gim, "Position D - "],
            [/^Read thethrow-As/gim, "Read the throw - As"],
            [/^Secondary play -Action/gim, "Secondary play - Action"],
            [/^Set for the play-/gim, "Set for the play - "],
            [/^Starting position - /gim, "Starting position - "],
            [/^Stayshome - /gim, "Stays home - "],
            [/^Stepup,turnandface the ball-/gim, "Step up, turn and face the ball - "],
            [/^Square lothe bag - /gim, "Square to the bag - "],
            [/^Subsequent play - /gim, "Subsequent play - "],
            [/^Third-base lineextended -/gim, "Third-base line extended - "],
            [/^Timeplay-/gim, "Time play - "],
            [/^Trail BR - /gim, "Trail BR - "],
            [/^U1- /gim, "U1 - "],
            [/^U2- /gim, "U2 - "],
            [/^U3- /gim, "U3 - "],
            [/^Working the wedge - /gim, "Working the wedge - "],
            [/([a-z])([A-Z])/g, "$1 $2"],
            [/([.,;:!?])([A-Za-z])/g, "$1 $2"],
            [/([a-z])(\d)/g, "$1 $2"],
            [/(\d)([A-Za-z])/g, "$1 $2"],
          ];

          replacements.forEach(function (pair) {
            cleaned = cleaned.replace(pair[0], pair[1]);
          });

          const lines = cleaned
            .split("\n")
            .map(function (line) {
              return line
                .replace(/\s+/g, " ")
                .replace(/\s+([.,;:!?])/g, "$1")
                .trim();
            })
            .filter(Boolean)
            .filter(function (line) {
              return !/^(Tbe Bo¥|profile view|Iron! view|front view|WORKING THE PLATE WORKING THE PLATE)$/i.test(line);
            })
            .filter(function (line) {
              return !/^(i|ii|iii|iv|v|vi|vii|viii|ix|x)$/i.test(line);
            })
            .filter(function (line) {
              return !/^\d+\s*$/.test(line);
            });

          return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
        }

        function normalizeHeading(line) {
          const trimmed = String(line || "").trim();
          if (!trimmed) {
            return "";
          }

          if (/^Introduction$/i.test(trimmed)) {
            return "Introduction";
          }
          if (/^DEFINITION OF TERMS$/i.test(trimmed) || /^Definition of Terms$/i.test(trimmed)) {
            return "DEFINITION OF TERMS";
          }
          if (/^WORKING THE PLATE$/i.test(trimmed)) {
            return "WORKING THE PLATE";
          }
          if (/^WORKING THE BASES$/i.test(trimmed)) {
            return "WORKING THE BASES";
          }
          if (/^WORKING AS A TEAM$/i.test(trimmed)) {
            return "WORKING AS A TEAM";
          }
          if (/^PREGAME PREPARATIONS$/i.test(trimmed)) {
            return "PREGAME PREPARATIONS";
          }
          if (/^SIGNAL CHART$/i.test(trimmed)) {
            return "SIGNAL CHART";
          }
          if (/^CREW OF ONE$/i.test(trimmed)) {
            return "CREW OF ONE";
          }
          if (/^CREW OF TWO$/i.test(trimmed)) {
            return "CREW OF TWO";
          }
          if (/^CREW OF THREE$/i.test(trimmed)) {
            return "CREW OF THREE";
          }
          if (/^CREW OF FOUR$/i.test(trimmed)) {
            return "CREW OF FOUR";
          }

          return trimmed.replace(/\s+/g, " ");
        }

        function renderManualText(text) {
          const cleanedText = cleanManualText(text);
          const lines = cleanedText
            .split("\n")
            .map((line) => line.replace(/\uFFFD/g, "").replace(/\s+/g, " ").trim())
            .filter(Boolean)
            .filter((line) => !/^(Version 2 manual loader|Tbe Bo¥|profile view|Iron! view)$/i.test(line))
            .filter((line) => !/^\.{2,}$/.test(line))
            .filter((line) => !/^[A-Za-z]$/.test(line))
            .filter((line) => !/^(i|ii|iii|iv|v|vi|vii|viii|ix|x)$/i.test(line))
            .filter((line) => !/^\d+\s*$/.test(line));

          const nav = [];
          const body = [];
          let index = 0;
          const seenHeadings = new Set();
          const headingPattern = /^(Introduction|DEFINITION OF TERMS|WORKING THE PLATE|WORKING THE BASES|WORKING AS A TEAM|PREGAME PREPARATIONS|SIGNAL CHART|CREW OF ONE|CREW OF TWO|CREW OF THREE|CREW OF FOUR)$/i;

          lines.forEach((line) => {
            const normalizedHeading = normalizeHeading(line);

            if (/^SECTION\s+\d+/i.test(normalizedHeading) || headingPattern.test(normalizedHeading)) {
              if (seenHeadings.has(normalizedHeading)) {
                return;
              }
              seenHeadings.add(normalizedHeading);
              index += 1;
              const id = "manual-section-" + index;
              nav.push('<a href="#' + id + '" class="rule-reader-nav-link">' + escapeHtml(normalizedHeading) + "</a>");
              body.push('<h3 class="rule-reader-section-title" id="' + id + '">' + escapeHtml(normalizedHeading) + "</h3>");
              return;
            }

            if (/^(ART\.|PENALTY:|NOTE:|NOTES:|EXCEPTION:)/i.test(normalizedHeading)) {
              body.push('<p class="rule-reader-paragraph rule-reader-emphasis">' + escapeHtml(normalizedHeading) + "</p>");
              return;
            }

            body.push('<p class="rule-reader-paragraph">' + escapeHtml(normalizedHeading) + "</p>");
          });

          return {
            navHtml: nav.join("") || '<p class="rule-reader-empty">Scroll the reader for the full manual text.</p>',
            bodyHtml: body.join("") || '<p class="rule-reader-empty">No manual text was found.</p>',
          };
        }

        const nav = document.querySelector("#manual-nav");
        const body = document.querySelector("#manual-body");
        
        nav.addEventListener("click", function (event) {
          const link = event.target.closest(".rule-reader-nav-link");
          if (!link) {
            return;
          }

          event.preventDefault();
          const href = link.getAttribute("href");
          const target = href ? document.querySelector(href) : null;
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });

        fetch("./manual-full.txt?v=20260326-1")
          .then(function (response) {
            if (!response.ok) {
              throw new Error("manual fetch failed");
            }
            return response.text();
          })
          .then(function (manualText) {
            const rendered = renderManualText(manualText);
            nav.innerHTML = rendered.navHtml;
            body.innerHTML = rendered.bodyHtml;
          })
          .catch(function () {
            body.innerHTML = '<p class="rule-reader-empty">The manual text could not be loaded yet.</p>';
          });
      })();
    </script>
  </body>
</html>
